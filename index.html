<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JoyFlix – Watch Movies &amp; TV Shows</title>
  <meta name="description" content="JoyFlix – Browse and stream the latest movies and TV shows in HD. Powered by TMDB." />
  <link rel="stylesheet" href="style.css" />
  <!-- Phosphor Icons CDN -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <!-- ════════════════ NAVBAR ════════════════ -->
  <nav id="navbar">
    <a href="#" class="nav-logo" id="homeBtn" aria-label="JoyFlix Home">
      <i class="ph-fill ph-film-strip" style="font-size:1.4rem"></i>
      Joy<span>Flix</span>
    </a>

    <ul class="nav-links" id="navLinks">
      <li><a href="#" class="active" id="navHome">Home</a></li>
      <li><a href="#" id="navMovies">Movies</a></li>
      <li><a href="#" id="navTV">TV Shows</a></li>
      <li><a href="#" id="navTrending">Trending</a></li>
    </ul>

    <div class="nav-right">
      <div class="search-wrap">
        <i class="ph ph-magnifying-glass search-icon" id="searchToggle" title="Search"></i>
        <input type="text" id="searchInput" placeholder="Search movies, shows…" autocomplete="off" />
      </div>
      <button class="btn-ai-nav" id="aiNavBtn" title="Ask AI for movie recommendations">
        <i class="ph-fill ph-sparkle"></i>
        <span>Ask AI</span>
      </button>
      <div class="avatar" title="My Profile">JF</div>
    </div>
  </nav>

  <!-- ════════════════ GENRE FILTER BAR ════════════════ -->
  <div id="genre-bar"></div>

  <!-- ════════════════ HERO ════════════════ -->
  <section id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-content">
      <div class="hero-type-badge" id="heroTypeBadge">
        <i class="ph-fill ph-fire-simple"></i> FEATURED
      </div>
      <h1 class="hero-title" id="heroTitle">Loading…</h1>
      <div class="hero-meta" id="heroMeta"></div>
      <p class="hero-overview" id="heroOverview"></p>
      <div class="hero-actions">
        <button class="btn-play" id="heroPlayBtn">
          <i class="ph-fill ph-play"></i> Play Now
        </button>
        <button class="btn-info" id="heroInfoBtn">
          <i class="ph ph-info"></i> More Info
        </button>
      </div>
    </div>
  </section>

  <!-- ════════════════ SEARCH RESULTS PAGE ════════════════ -->
  <div id="search-results-page">
    <p class="search-results-title">Results for: <span id="searchQueryLabel"></span></p>
    <div class="search-grid" id="searchGrid"></div>
  </div>

  <!-- ════════════════ MAIN CONTENT (rows) ════════════════ -->
  <main id="main-content">
    <!-- Rows are injected by JS -->
  </main>

  <!-- ════════════════ DETAIL MODAL ════════════════ -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" title="Close">
        <i class="ph ph-x"></i>
      </button>

      <div class="modal-hero" id="modalHero">
        <img id="modalBackdrop" src="" alt="Backdrop" />
        <div class="modal-hero-gradient"></div>
      </div>

      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle">Title</h2>
        <div class="modal-meta" id="modalMeta"></div>
        <p class="modal-overview" id="modalOverview"></p>

        <!-- TV controls -->
        <div id="tvControls" style="display:none">
          <p class="season-label">Season</p>
          <div class="season-ep-row" id="seasonBtns"></div>
          <p class="season-label">Episode</p>
          <div class="season-ep-row" id="episodeBtns"></div>
        </div>

        <div class="modal-actions" id="modalActions"></div>
        <div class="genre-chips" id="modalGenres"></div>
      </div>
    </div>
  </div>

  <!-- ════════════════ PLAYER OVERLAY ════════════════ -->
  <div id="player-overlay">
    <div class="player-topbar">
      <button class="player-back" id="playerBack">
        <i class="ph ph-arrow-left"></i> Back
      </button>
      <span class="player-title" id="playerTitle"></span>
    </div>
    <iframe
      id="player-iframe"
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture"
    ></iframe>
  </div>

  <!-- ════════════════ TOAST ════════════════ -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- ════════════════ AI PROMPT MODAL ════════════════ -->
  <div id="ai-overlay">
    <div class="ai-modal" id="aiModal">

      <div class="ai-modal-header">
        <div class="ai-modal-title">
          <i class="ph-fill ph-sparkle" style="color:var(--ai-purple)"></i>
          AI Movie Picks
        </div>
        <button class="modal-close" id="aiClose"><i class="ph ph-x"></i></button>
      </div>

      <div class="ai-key-row" id="aiKeyRow">
        <i class="ph ph-key" style="color:var(--text-mute);flex-shrink:0"></i>
        <input
          type="password"
          id="aiKeyInput"
          class="ai-key-field"
          placeholder="Paste your OpenAI API key  (sk-…)"
          autocomplete="off"
        />
        <button class="ai-save-key" id="aiSaveKey">Save</button>
      </div>

      <div class="ai-prompt-wrap">
        <textarea
          id="aiPromptInput"
          class="ai-textarea"
          placeholder="Describe what you want to watch…&#10;e.g. &quot;Dark psychological thrillers like Black Mirror&quot;"
          rows="3"
        ></textarea>
        <div class="ai-example-chips">
          <span class="ai-chip" data-prompt="Dark psychological thrillers like Inception">🧠 Dark thrillers</span>
          <span class="ai-chip" data-prompt="Feel-good romantic comedies from the 2000s">💕 Rom-coms</span>
          <span class="ai-chip" data-prompt="Epic sci-fi space adventures like Interstellar">🚀 Sci-fi space</span>
          <span class="ai-chip" data-prompt="Scary horror movies that will keep me up at night">👻 Horror</span>
          <span class="ai-chip" data-prompt="Critically acclaimed animated movies for all ages">🎨 Animation</span>
          <span class="ai-chip" data-prompt="Best crime drama TV shows like Breaking Bad">🔫 Crime TV</span>
        </div>
      </div>

      <button class="ai-submit-btn" id="aiSubmitBtn">
        <i class="ph-fill ph-sparkle"></i>
        <span id="aiSubmitLabel">Generate Picks</span>
      </button>

      <div class="ai-results" id="aiResults"></div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
